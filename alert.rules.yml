groups:
  - name: model_drift_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.687
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model prediction confidence has dropped below threshold"
          description: "prediction_confidence_score is below 0.687 for more than 1 minute"